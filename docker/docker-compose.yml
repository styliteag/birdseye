services:
  birdseye:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: birdseye:latest
    container_name: birdseye
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # NetBird API
      NB_URL: ${NB_URL}
      NB_API_KEY: ${NB_API_KEY}
      NB_ADMIN_API_KEY: ${NB_ADMIN_API_KEY:-}

      # Forwarder
      POLL_INTERVAL: ${POLL_INTERVAL:-30}
      STATE_FILE: /var/lib/birdseye/state.json
      MAX_CATCHUP: ${MAX_CATCHUP:-200}
      OUTAGE_ALERT_MINUTES: ${OUTAGE_ALERT_MINUTES:-10}
      BACKOFF_CAP_SECONDS: ${BACKOFF_CAP_SECONDS:-300}
      BACKLOG_WARN_THRESHOLD: ${BACKLOG_WARN_THRESHOLD:-1000}

      # Per-sink filters (fnmatch globs, comma-separated)
      STDOUT_INCLUDE: ${STDOUT_INCLUDE:-*}
      MATTERMOST_INCLUDE: ${MATTERMOST_INCLUDE:-*}
      EMAIL_INCLUDE: ${EMAIL_INCLUDE:-policy.*,user.*,setupkey.*,personalaccesstoken.*,account.*}

      # Mattermost (empty webhook disables the sink)
      MATTERMOST_WEBHOOK_URL: ${MATTERMOST_WEBHOOK_URL:-}
      MATTERMOST_USERNAME: ${MATTERMOST_USERNAME:-BirdsEye}

      # Email (EMAIL_MODE: off | immediate | digest)
      EMAIL_MODE: ${EMAIL_MODE:-off}
      EMAIL_DIGEST_MINUTES: ${EMAIL_DIGEST_MINUTES:-15}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      # starttls | tls | none — leave empty to honour SMTP_STARTTLS (legacy).
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TO: ${SMTP_TO:-}

      # Cron jobs (empty schedule = disabled)
      CRON_CLEANUP_EPHEMERAL: ${CRON_CLEANUP_EPHEMERAL:-*/15 * * * *}
      CRON_BACKUP_NETBIRD: ${CRON_BACKUP_NETBIRD:-}

      # Volume backup (mount NetBird volumes read-only under /backup, see below)
      BACKUP_PATHS: ${BACKUP_PATHS:-}
      BACKUP_ZIP_PASSWORD: ${BACKUP_ZIP_PASSWORD:-}
      BACKUP_EMAIL_TO: ${BACKUP_EMAIL_TO:-}
      BACKUP_MAX_ATTACHMENT_MB: ${BACKUP_MAX_ATTACHMENT_MB:-20}
      BACKUP_LABEL: ${BACKUP_LABEL:-}
      BACKUP_EXCLUDE: ${BACKUP_EXCLUDE:-}
      # API export — second mail, runs in the same backup cron when
      # NB_ADMIN_API_KEY is set. Falls back to BACKUP_EMAIL_TO / SMTP_TO.
      EXPORT_EMAIL_TO: ${EXPORT_EMAIL_TO:-}

      # Timezone for stdout/email/Mattermost timestamps
      TZ: ${TZ:-UTC}
    volumes:
      - birdseye-state:/var/lib/birdseye
      # --- NetBird volume backup mounts (read-only) -----------------------
      # Uncomment and adjust to match the volume names in your NetBird
      # docker-compose. Then set BACKUP_PATHS in .env, e.g.
      #   BACKUP_PATHS=/backup/management,/backup/signal
      # - netbird_management:/backup/management:ro
      # - netbird_signal:/backup/signal:ro
      # - netbird_caddy_data:/backup/caddy:ro

    # --- Alternative: join your production NetBird docker network ---
    # If you prefer to reach NetBird internally instead of via the public
    # hostname, uncomment the block below, set NB_URL=http://<service>:<port>
    # in .env, and ensure the external network name matches your prod stack.
    #
    # networks:
    #   - netbird

# networks:
#   netbird:
#     external: true
#     name: netbird_default

volumes:
  birdseye-state:
    driver: local
  # Declare external NetBird volumes here once the mounts above are
  # uncommented, e.g.:
  # netbird_management:
  #   external: true
  #   name: netbird_management
  # netbird_signal:
  #   external: true
  #   name: netbird_signal
  # netbird_caddy_data:
  #   external: true
  #   name: netbird_caddy_data
