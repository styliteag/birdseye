name: Release Docker Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (optional, defaults to VERSION file)'
        required: false
        type: string

env:
  IMAGE_NAME: birdseye
  DOCKERHUB_NAMESPACE: styliteag

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-22.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(cat VERSION | tr -d '\n')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          IFS='.' read -r -a parts <<< "$VERSION"
          echo "major=${parts[0]}" >> $GITHUB_OUTPUT
          echo "minor=${parts[1]}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION (major=${parts[0]} minor=${parts[1]})"

      - name: Extract tag name
        id: tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
          else
            TAG_NAME="v${{ steps.version.outputs.version }}"
          fi
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push per-arch image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          cache-from: type=registry,ref=ghcr.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}/buildcache:linux-${{ matrix.arch }}
          cache-to: type=registry,ref=ghcr.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}/buildcache:linux-${{ matrix.arch }},mode=max
          sbom: true
          provenance: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            VCS_REF=${{ github.sha }}
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-${{ matrix.arch }}
            ghcr.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-${{ matrix.arch }}

  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(cat VERSION | tr -d '\n')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          IFS='.' read -r -a parts <<< "$VERSION"
          echo "major=${parts[0]}" >> $GITHUB_OUTPUT
          echo "minor=${parts[1]}" >> $GITHUB_OUTPUT

      - name: Extract tag name
        id: tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
          else
            TAG_NAME="v${{ steps.version.outputs.version }}"
          fi
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        env:
          V: ${{ steps.version.outputs.version }}
          M: ${{ steps.version.outputs.major }}
          MM: ${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
          HUB: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          GHCR: ghcr.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
        run: |
          for registry in "$HUB" "$GHCR"; do
            for extra_tag in "$V" "latest" "$MM" "$M"; do
              docker buildx imagetools create \
                -t "${registry}:${extra_tag}" \
                "${registry}:${V}-amd64" \
                "${registry}:${V}-arm64"
            done
          done

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "Release $TAG

          Built from tag: $TAG

          Docker images:
          - \`${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:$V\`
          - \`ghcr.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:$V\`" \
            --latest
